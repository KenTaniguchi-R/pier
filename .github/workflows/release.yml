name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install npm deps
        run: npm ci

      # tauri-action runs the full pipeline:
      # - builds the universal binary
      # - ad-hoc codesigns the .app via tauri.conf.json (signingIdentity: "-")
      # - bundles into .app.tar.gz (for the updater) and .dmg (for first install)
      # - signs the .app.tar.gz with TAURI_SIGNING_PRIVATE_KEY -> .sig
      # - creates the GitHub Release and uploads all three.
      - name: Build + release with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Pier ${{ github.ref_name }}
          releaseBody: "See CHANGELOG.md for the full release notes."
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Generate latest.json
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          TARBALL=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app.tar.gz" | head -n1)
          SIG_FILE="${TARBALL}.sig"
          if [ ! -f "$TARBALL" ] || [ ! -f "$SIG_FILE" ]; then
            echo "Missing tarball or sig under $BUNDLE_DIR" >&2
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi
          SIG=$(cat "$SIG_FILE")
          NOTES=$(awk '/^## /{if(p)exit; p=1} p' CHANGELOG.md 2>/dev/null || echo "Release ${VERSION}")
          URL="https://github.com/${REPO}/releases/download/${REF_NAME}/$(basename "$TARBALL")"
          jq -n \
            --arg version "$VERSION" \
            --arg pubDate "$PUB_DATE" \
            --arg notes   "$NOTES" \
            --arg sig     "$SIG" \
            --arg url     "$URL" \
            '{ version:$version, pub_date:$pubDate, notes:$notes,
               platforms: { "darwin-aarch64": {signature:$sig, url:$url},
                            "darwin-x86_64":  {signature:$sig, url:$url} } }' \
            > latest.json

      - name: Attach latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
