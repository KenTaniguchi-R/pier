name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Rust universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install npm deps
        run: npm ci

      # tauri-action runs the full pipeline:
      # - builds the universal binary
      # - codesigns the .app with the Developer ID cert imported from APPLE_CERTIFICATE
      # - bundles into .app.tar.gz (updater) and .dmg (first install)
      # - notarizes + staples via notarytool using APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
      # - signs the .app.tar.gz with TAURI_SIGNING_PRIVATE_KEY -> .sig (updater signature)
      # - creates the GitHub Release and uploads all three.
      - name: Build + release with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Pier ${{ github.ref_name }}
          releaseBody: "See CHANGELOG.md for the full release notes."
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Generate latest.json
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          # The on-disk tarball + sig (whatever name Tauri produced locally)
          SIG_FILE=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app.tar.gz.sig" | head -n1)
          if [ ! -f "$SIG_FILE" ]; then
            echo "Missing .app.tar.gz.sig under $BUNDLE_DIR" >&2
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi
          SIG=$(cat "$SIG_FILE")
          NOTES=$(awk '/^## /{if(p)exit; p=1} p' CHANGELOG.md 2>/dev/null || echo "Release ${VERSION}")
          # The actual asset URL on the GitHub Release (tauri-action renames on upload)
          URL=$(gh release view "$REF_NAME" --repo "$REPO" --json assets \
                  --jq '.assets[] | select(.name | endswith(".app.tar.gz")) | .url' \
                | head -n1)
          if [ -z "$URL" ]; then
            echo "Could not resolve asset URL from release" >&2
            gh release view "$REF_NAME" --repo "$REPO" --json assets --jq '.assets[].name' || true
            exit 1
          fi
          jq -n \
            --arg version "$VERSION" \
            --arg pubDate "$PUB_DATE" \
            --arg notes   "$NOTES" \
            --arg sig     "$SIG" \
            --arg url     "$URL" \
            '{ version:$version, pub_date:$pubDate, notes:$notes,
               platforms: { "darwin-aarch64": {signature:$sig, url:$url},
                            "darwin-x86_64":  {signature:$sig, url:$url} } }' \
            > latest.json

      - name: Attach latest.json to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
