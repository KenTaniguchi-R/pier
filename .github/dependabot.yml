version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "tauri*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
