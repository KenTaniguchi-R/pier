<!-- macOS menu-bar template icon, hand-drawn at 22pt for legibility.
     Black + alpha only; system applies tint. Geometry simplified from the master:
     deck on top + three pilings + thin waterline. No dock-light glyph at this size. -->
<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- deck -->
  <rect x="3" y="9" width="16" height="2.4" rx="0.4" fill="#000000"/>
  <!-- three pilings hanging from the deck -->
  <rect x="5"  y="11.4" width="1.8" height="5.4" fill="#000000"/>
  <rect x="10.1" y="11.4" width="1.8" height="5.4" fill="#000000"/>
  <rect x="15.2" y="11.4" width="1.8" height="5.4" fill="#000000"/>
  <!-- waterline -->
  <rect x="2" y="17.2" width="18" height="0.9" rx="0.3" fill="#000000"/>
</svg>
